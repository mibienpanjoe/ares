name: Create release draft on tag push

# Tag publish flow:
#   1. `git push origin v0.2.3`            → npm-publish.yml publishes npm
#   2. This workflow creates a DRAFT GitHub release for release notes
#
# A draft release is NOT visible publicly. It is release-note convenience only;
# npm publication is handled directly by the tag-triggered npm workflow.

on:
  push:
    tags:
      - "v*"

jobs:
  draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve previous tag
        id: prev
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"
      - name: Build changelog
        id: changelog
        run: |
          if [ -n "${{ steps.prev.outputs.tag }}" ]; then
            RANGE="${{ steps.prev.outputs.tag }}..${{ github.ref_name }}"
          else
            RANGE="${{ github.ref_name }}"
          fi
          {
            echo "body<<EOF"
            echo "## Changes since ${{ steps.prev.outputs.tag }}"
            echo
            git log --pretty='format:- %s' "$RANGE"
            echo
            echo
            echo "Published to npm: https://www.npmjs.com/package/ares-harness/v/${GITHUB_REF_NAME#v}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: true
          prerelease: false
